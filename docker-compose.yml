services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mkjs
      POSTGRES_USER: mkjs
      POSTGRES_PASSWORD: mkjs
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: mkjs
      POSTGRES_USER: mkjs
      POSTGRES_PASSWORD: mkjs
    ports:
      - "55556:55555"
    volumes:
      - .:/app
      - app_node_modules:/app/server/node_modules

volumes:
  postgres_data:
  app_node_modules: