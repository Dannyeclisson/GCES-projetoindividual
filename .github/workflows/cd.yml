name: CD Publish Docker Images

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish-images:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set image names
        run: |
          REPOSITORY_LOWER="${GITHUB_REPOSITORY,,}"
          echo "BACKEND_IMAGE=ghcr.io/${REPOSITORY_LOWER}-backend" >> "$GITHUB_ENV"
          echo "WEB_IMAGE=ghcr.io/${REPOSITORY_LOWER}-web" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.prod
          target: backend-prod
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}

      - name: Build and publish web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.prod
          target: web-prod
          push: true
          tags: |
            ${{ env.WEB_IMAGE }}:latest
            ${{ env.WEB_IMAGE }}:${{ github.sha }}
