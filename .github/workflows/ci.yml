name: CI Build, Lint, Test, Fuzz & Security

on:
  push:
  pull_request:

jobs:
  build-and-lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        working-directory: server
        run: npm ci

      - name: Lint
        working-directory: server
        run: npm run lint

      - name: Build check
        working-directory: server
        run: npm run build

      - name: Unit tests with coverage
        working-directory: server
        run: npm run test:coverage

      - name: Fuzz tests
        working-directory: server
        run: npm run test:fuzz

      - name: Dependency audit
        working-directory: server
        run: npm run security:sca

      - name: SAST
        working-directory: server
        run: npm run security:sast

      - name: Check SonarCloud token
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          if [ -z "$SONAR_TOKEN" ]; then
            echo "::error::SONAR_TOKEN is empty or unavailable for this workflow run."
            echo "::error::Check if the secret was created before this run, if it is a repository Actions secret, and if this run is not from an untrusted fork."
            exit 1
          fi
          echo "SONAR_TOKEN is available for this workflow run."

      - name: SonarCloud analysis
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
