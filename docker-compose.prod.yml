services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mkjs
      POSTGRES_USER: mkjs
      POSTGRES_PASSWORD: mkjs
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile.prod
      target: backend-prod
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: mkjs
      POSTGRES_USER: mkjs
      POSTGRES_PASSWORD: mkjs
    expose:
      - "55555"

  web:
    build:
      context: .
      dockerfile: Dockerfile.prod
    depends_on:
      - app
    ports:
      - "8080:80"

volumes:
  postgres_prod_data:
