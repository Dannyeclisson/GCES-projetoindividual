apiVersion: apps/v1
kind: Deployment
metadata:
  name: mkjs-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mkjs-app
  template:
    metadata:
      labels:
        app: mkjs-app
    spec:
      containers:
        - name: app
          image: mkjs-backend-prod:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 55555
          env:
            - name: POSTGRES_HOST
              valueFrom:
                configMapKeyRef:
                  name: mkjs-config
                  key: POSTGRES_HOST
            - name: POSTGRES_PORT
              valueFrom:
                configMapKeyRef:
                  name: mkjs-config
                  key: POSTGRES_PORT
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: mkjs-config
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: mkjs-postgres-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mkjs-postgres-secret
                  key: POSTGRES_PASSWORD
          readinessProbe:
            tcpSocket:
              port: 55555
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 55555
            initialDelaySeconds: 30
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: app
spec:
  type: ClusterIP
  selector:
    app: mkjs-app
  ports:
    - name: http
      port: 55555
      targetPort: 55555
