apiVersion: apps/v1
kind: Deployment
metadata:
  name: mkjs-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mkjs-web
  template:
    metadata:
      labels:
        app: mkjs-web
    spec:
      containers:
        - name: web
          image: ghcr.io/dannyeclisson/gces-projetoindividual-web:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: mkjs-web
spec:
  type: ClusterIP
  selector:
    app: mkjs-web
  ports:
    - name: http
      port: 80
      targetPort: 80
